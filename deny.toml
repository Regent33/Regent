# cargo-deny configuration — supply-chain gates run in CI (see
# .github/workflows/ci.yml). Schema v2.

[advisories]
version = 2
# RUSTSEC vulnerability advisories always fail the build (v2 default); a
# yanked crate is treated the same. Add a justified `ignore = ["RUSTSEC-..."]`
# entry only with a comment explaining why.
yanked = "deny"
ignore = []

[licenses]
version = 2
# Permissive licenses only — the workspace ships no copyleft obligations.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
# Duplicate versions are a warning (transitive dupes are common), wildcards a
# warning (we pin in Cargo.toml). Promote to "deny" once the tree is clean.
multiple-versions = "warn"
wildcards = "warn"

[sources]
# Only crates.io and the workspace itself — no unknown registries or git deps.
unknown-registry = "deny"
unknown-git = "deny"

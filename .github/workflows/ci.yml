name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The workspace vendors or-core/or-mcp in-repo (ADR-032), so Regent builds
# standalone — no sibling checkout and no repo variables needed.

jobs:
  rust:
    name: rust — fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup show # installs the channel + components from rust-toolchain.toml
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      # regent-voice-server pulls sherpa-onnx, whose bindgen needs LLVM/libclang,
      # and it is excluded from release binaries — skip it here so CI needs no
      # native speech toolchain. `cargo fmt --all` above still covers its source.
      - name: Clippy
        run: cargo clippy --workspace --exclude regent-voice-server --all-targets
      - name: Test
        run: cargo test --workspace --exclude regent-voice-server

  supply-chain:
    name: supply-chain — audit · deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny
      - name: Audit advisories (RUSTSEC)
        # RUSTSEC-2023-0071 (rsa Marvin timing sidechannel) has no fixed release;
        # accepted and tracked. Fixable advisories are kept current in Cargo.lock.
        run: cargo audit --ignore RUSTSEC-2023-0071
      - name: Deny (advisories · licenses · sources)
        run: cargo deny check

  cli:
    name: cli — typecheck · lint · test · compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/regent-cli
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Lint
        run: bunx biome check src
      - name: Test
        run: bun test
      - name: Compile (single binary)
        run: bun run compile

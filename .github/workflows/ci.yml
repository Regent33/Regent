name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# IMPORTANT — Orchustr dependency.
# Regent's Cargo.toml points or-core/or-mcp at `../Orchustr/orchustr/...`, so
# every Rust job needs the Orchustr checkout laid out as a SIBLING of Regent.
# Set the repo variable `ORCHUSTR_REPO` (Settings → Secrets and variables →
# Actions → Variables) to your Orchustr repo (e.g. `your-org/orchustr`), and
# optionally `ORCHUSTR_REF` (defaults to `main`). For a private Orchustr, add a
# deploy key / token to the Orchustr checkout step. Until `ORCHUSTR_REPO` is
# set, the Rust jobs are skipped (the Go job still runs).

jobs:
  rust:
    name: rust — fmt · clippy · test
    runs-on: ubuntu-latest
    if: ${{ vars.ORCHUSTR_REPO != '' }}
    steps:
      - name: Checkout Regent
        uses: actions/checkout@v4
        with:
          path: Regent
      - name: Checkout Orchustr (sibling path dependency)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.ORCHUSTR_REPO }}
          ref: ${{ vars.ORCHUSTR_REF || 'main' }}
          path: Orchustr
      - name: Install pinned toolchain
        working-directory: Regent
        run: rustup show # installs the channel + components from rust-toolchain.toml
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: Regent
      - name: Format
        working-directory: Regent
        run: cargo fmt --all -- --check
      - name: Clippy
        working-directory: Regent
        run: cargo clippy --workspace --all-targets
      - name: Test
        working-directory: Regent
        run: cargo test --workspace

  supply-chain:
    name: supply-chain — audit · deny
    runs-on: ubuntu-latest
    if: ${{ vars.ORCHUSTR_REPO != '' }}
    steps:
      - name: Checkout Regent
        uses: actions/checkout@v4
        with:
          path: Regent
      - name: Checkout Orchustr (sibling path dependency)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.ORCHUSTR_REPO }}
          ref: ${{ vars.ORCHUSTR_REF || 'main' }}
          path: Orchustr
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny
      - name: Audit advisories (RUSTSEC)
        working-directory: Regent
        run: cargo audit
      - name: Deny (advisories · licenses · sources)
        working-directory: Regent
        run: cargo deny check

  cli:
    name: cli — typecheck · lint · test · compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/regent-cli
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Lint
        run: bunx biome check src
      - name: Test
        run: bun test
      - name: Compile (single binary)
        run: bun run compile
